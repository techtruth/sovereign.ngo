      VERIFIER_DID: did:example:verifier:utility-bill
      SIGNING_SECRET: utility-bill-secret
      MOCK_ALWAYS_ACCEPT: "true"
      DEMO_WEBID: http://holder_sovereign:4000/profile/card#me
