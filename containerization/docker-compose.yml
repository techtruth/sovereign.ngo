    container_name: sovereign-verifier-itar
    environment:
      PORT: 5000
      VERIFIER_PROFILE: itar
      VERIFIER_NAME: ITAR Compliance Verifier
      VERIFIER_DID: did:example:verifier:itar
      SIGNING_SECRET: itar-secret
      MOCK_ALWAYS_ACCEPT: "true"
      DEMO_WEBID: http://holder_sovereign:4000/profile/card#me
    ports:
      - "8093:5000"

  verifier_passport:
    build:
      context: ..
      dockerfile: containerization/Dockerfile.verifier-portal
    image: sovereign-verifier-passport:latest
    container_name: sovereign-verifier-passport
    environment:
      PORT: 5000
      VERIFIER_PROFILE: passport
      VERIFIER_NAME: Passport Verifier
      VERIFIER_DID: did:example:verifier:passport
      SIGNING_SECRET: passport-secret
      MOCK_ALWAYS_ACCEPT: "true"
