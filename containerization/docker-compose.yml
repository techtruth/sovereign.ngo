x-provider-web: &provider_web
  image: nginx:alpine
  volumes:
    - ../demo_webapp:/usr/share/nginx/html:ro

x-provider-api: &provider_api
  build:
    context: ..
    dockerfile: containerization/Dockerfile.provider-api
  image: sovereign-provider-api:latest
  volumes:
    - ./certs/dev-localhost.crt:/etc/sovereign/tls/internal.crt:ro
    - ./certs/dev-localhost.key:/etc/sovereign/tls/internal.key:ro

x-provider-pod: &provider_pod
  build:
    context: ..
    dockerfile: containerization/Dockerfile.solid-pod
  image: sovereign-provider-pod:latest
  volumes:
    - ./certs/dev-localhost.crt:/etc/sovereign/tls/internal.crt:ro
    - ./certs/dev-localhost.key:/etc/sovereign/tls/internal.key:ro
  tmpfs:
    - /data

services:
  holder_sovereign:
    build:
      context: ..
      dockerfile: containerization/Dockerfile.solid-pod
    image: sovereign-holder-sovereign:latest
    container_name: sovereign-holder-sovereign
    environment:
      CSS_BASE_URL: https://localhost:8180/
    volumes:
      - ./certs/dev-localhost.crt:/etc/sovereign/tls/internal.crt:ro
      - ./certs/dev-localhost.key:/etc/sovereign/tls/internal.key:ro
    tmpfs:
      - /data

  standards_service:
    build:
      context: ..
      dockerfile: containerization/Dockerfile.standards
    image: sovereign-standards-service:latest
    container_name: sovereign-standards-service
    environment:
      PORT: 8090
      DID_DOMAIN: 'demo.sovereign.ngo'
      STANDARDS_DATA_DIR: '/app/data'
      STATE_SOURCE_URL: 'http://holder_sovereign:3001/sovereign/demo/state.json'
    volumes:
      - ../demo_webapp/data:/app/data:ro

  sovereign_gateway:
    image: nginx:alpine
    container_name: sovereign-gateway
    depends_on:
      - holder_sovereign
      - standards_service
      - provider_web_nolichucky_family_clinic
      - provider_api_nolichucky_family_clinic
      - provider_pod_nolichucky_family_clinic
      - provider_web_riverbend_dental_clinic
