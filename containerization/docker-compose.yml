services:
  holder_sovereign:
    build:
      context: ..
      dockerfile: containerization/Dockerfile.solid-pod
    image: sovereign-holder-sovereign:latest
    container_name: sovereign-holder-sovereign
    environment:
      CSS_BASE_URL: http://localhost:8180/
    tmpfs:
      - /data

  sovereign_gateway:
    image: nginx:alpine
    container_name: sovereign-gateway
    depends_on:
      - holder_sovereign
    volumes:
      - ./sovereign-gateway.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8180:80"

  credential_explorer:
    build:
      context: ..
      dockerfile: containerization/Dockerfile.credential-explorer
    image: sovereign-credential-explorer:latest
    container_name: sovereign-credential-explorer
    environment:
      PORT: 3000
      SOVEREIGN_INTERNAL_ORIGIN: http://sovereign_gateway:80
      DEMO_WEBID: http://localhost:8180/profile/card#me
    ports:
      - "8070:3000"
    depends_on:
      - sovereign_gateway

  holder_doctors_office:
    build:
      context: ..
      dockerfile: containerization/Dockerfile.solid-pod
    image: sovereign-holder-doctors-office:latest
    container_name: sovereign-holder-doctors-office
    environment:
      CSS_BASE_URL: http://holder_doctors_office:3000/
    tmpfs:
      - /data
    networks:
      - doctors_office_net

  issuer_doctors_office:
    build:
      context: ..
      dockerfile: containerization/Dockerfile.issuer-portal
    image: sovereign-issuer-doctors-office:latest
    container_name: sovereign-issuer-doctors-office
    environment:
      SITE_DIR: doctors-office
      PORT: 3000
      SOLID_POD_URL: http://holder_doctors_office:3000/
      SOVEREIGN_POD_URL: http://localhost:8180/
      SOVEREIGN_INTERNAL_ORIGIN: http://sovereign_gateway:80
      DEMO_WEBID: http://localhost:8180/profile/card#me
    ports:
      - "8081:3000"
    depends_on:
      - holder_doctors_office
    networks:
      - doctors_office_net
      - default

