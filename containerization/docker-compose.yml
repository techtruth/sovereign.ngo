      VERIFIER_DID: did:example:verifier:self-presence
      SIGNING_SECRET: self-presence-secret
      MOCK_ALWAYS_ACCEPT: "true"
      DEMO_WEBID: http://holder_sovereign:4000/profile/card#me
    ports:
      - "8095:5000"

networks:
  doctors_office_net:
  car_repair_shop_net:
  sports_park_net:
  national_metal_works_net:
