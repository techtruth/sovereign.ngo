server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/certs/dev-localhost.crt;
  ssl_certificate_key /etc/nginx/certs/dev-localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  add_header Strict-Transport-Security "max-age=31536000" always;

  resolver 127.0.0.11 ipv6=off;

  location /website/ {
    root /srv;
    try_files $uri $uri/index.html =404;
    add_header Cache-Control "no-store";
  }

  location /demo_webapp/ {
    root /srv;
    try_files $uri $uri/index.html =404;
    add_header Cache-Control "no-store";
  }

  location ~ ^/provider-sites/([a-z0-9_]+)/(.*)$ {
    rewrite ^/provider-sites/[a-z0-9_]+/(.*)$ /demo_webapp/$1 break;
    root /srv;
    try_files $uri $uri/index.html =404;
    add_header Cache-Control "no-store";
  }

  location ~ ^/provider-api/([a-z0-9_]+)/ {
    set $provider_id $1;
    set $provider_api_upstream provider_api_$provider_id;
    rewrite ^/provider-api/[a-z0-9_]+/(.*)$ /$1 break;
    proxy_pass https://$provider_api_upstream:8080;
    proxy_ssl_server_name on;
    proxy_ssl_name localhost;
    proxy_ssl_trusted_certificate /etc/nginx/certs/dev-localhost.crt;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 2;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8180;
    proxy_set_header X-Forwarded-Host localhost:8180;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Gateway-Proxy sovereign-gateway;
    proxy_set_header Authorization "Bearer sovereign-demo-provider-api-token";
    proxy_set_header Connection "";
    add_header Cache-Control "no-store";
  }

  location ~ ^/provider-pods/([a-z0-9_]+)/ {
    set $provider_id $1;
    set $provider_pod_upstream provider_pod_$provider_id;
    rewrite ^/provider-pods/[a-z0-9_]+/(.*)$ /$1 break;
    proxy_pass https://$provider_pod_upstream:3000;
    proxy_ssl_server_name on;
    proxy_ssl_name localhost;
    proxy_ssl_trusted_certificate /etc/nginx/certs/dev-localhost.crt;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 2;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8180;
    proxy_set_header X-Forwarded-Host localhost:8180;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    add_header Cache-Control "no-store";
  }

  location / {
    proxy_pass https://holder_sovereign:3000;
    proxy_ssl_server_name on;
    proxy_ssl_name localhost;
    proxy_ssl_trusted_certificate /etc/nginx/certs/dev-localhost.crt;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 2;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8180;
    proxy_set_header X-Forwarded-Host localhost:8180;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
  }
}
