server {
  listen 80;
  server_name _;

  resolver 127.0.0.11 ipv6=off;

  location /website/ {
    root /srv;
    try_files $uri $uri/index.html =404;
    add_header Cache-Control "no-store";
  }

  location /demo_webapp/ {
    root /srv;
    try_files $uri $uri/index.html =404;
    add_header Cache-Control "no-store";
  }

  location ~ ^/provider-sites/([a-z0-9_]+)/ {
    set $provider_id $1;
    set $provider_web_upstream provider_web_$provider_id;
    rewrite ^/provider-sites/[a-z0-9_]+/(.*)$ /$1 break;
    proxy_pass http://$provider_web_upstream:80;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8180;
    proxy_set_header X-Forwarded-Host localhost:8180;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header Connection "";
    add_header Cache-Control "no-store";
  }

  location ~ ^/provider-api/([a-z0-9_]+)/ {
    set $provider_id $1;
    set $provider_api_upstream provider_api_$provider_id;
    rewrite ^/provider-api/[a-z0-9_]+/(.*)$ /$1 break;
    proxy_pass http://$provider_api_upstream:8080;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8180;
    proxy_set_header X-Forwarded-Host localhost:8180;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header Connection "";
    add_header Cache-Control "no-store";
  }

  location ~ ^/provider-pods/([a-z0-9_]+)/ {
    set $provider_id $1;
    set $provider_pod_upstream provider_pod_$provider_id;
    rewrite ^/provider-pods/[a-z0-9_]+/(.*)$ /$1 break;
    proxy_pass http://$provider_pod_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8180;
    proxy_set_header X-Forwarded-Host localhost:8180;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header Connection "";
    add_header Cache-Control "no-store";
  }

  location / {
    proxy_pass http://holder_sovereign:3000;
    proxy_http_version 1.1;
    proxy_set_header Host localhost:8180;
    proxy_set_header X-Forwarded-Host localhost:8180;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header Connection "";
  }
}
