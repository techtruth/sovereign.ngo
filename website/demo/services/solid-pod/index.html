<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sovereign Solid Pod Demo</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <style>
    :root {
      --bg: #f3f8fd;
      --panel: #ffffff;
      --line: #c9d8e6;
      --ink: #223245;
      --muted: #4e6277;
      --brand: #005eb8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #e5eff9, var(--bg) 58%);
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    .wrap {
      width: min(1160px, 96vw);
      margin: 0 auto;
      padding: 12px 0 16px;
      display: grid;
      gap: 10px;
    }

    .mast,
    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px;
    }

    .mast {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      color: #144768;
    }

    .sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 4px;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
    }

    select,
    button {
      font: inherit;
    }

    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 9px;
      background: #fff;
      color: var(--ink);
    }

    button {
      border: 1px solid #0b4f86;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .panel h2 {
      margin: 0 0 7px;
      font-size: 0.92rem;
      color: #174b6e;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      background: #f7fbff;
    }

    .panel ul {
      margin: 0;
      padding-left: 18px;
      color: #43586c;
      font-size: 0.83rem;
      display: grid;
      gap: 5px;
    }

    .mono {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfe;
      padding: 8px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.74rem;
      color: #2f4458;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .pill {
      display: inline-block;
      border: 1px solid #b7ccdd;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #2d5676;
      background: #f2f8fd;
      margin-left: 4px;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="mast">
      <div>
        <h1>Sovereign Solid Pod</h1>
        <p class="sub">Resident-controlled record view backed by in-browser demo state.</p>
      </div>
      <div id="identitySummary" class="sub"></div>
    </section>

    <section class="panel">
      <div class="controls">
        <label>
          Sovereign Identity
          <select id="identitySelect"></select>
        </label>
        <button id="refreshBtn" type="button">Refresh View</button>
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Identity Profile</h2>
        <pre id="profileBlock" class="mono">{}</pre>
      </article>

      <article class="panel">
        <h2>Credentials</h2>
        <ul id="credentialList"></ul>
      </article>

      <article class="panel">
        <h2>Pod Resources by Provider</h2>
        <ul id="resourceList"></ul>
      </article>

      <article class="panel">
        <h2>Sharing Permissions</h2>
        <ul id="consentList"></ul>
      </article>

      <article class="panel">
        <h2>Referrals</h2>
        <ul id="referralList"></ul>
      </article>

      <article class="panel">
        <h2>Recent Events</h2>
        <ul id="eventList"></ul>
      </article>

      <article class="panel wide">
        <h2>Raw Pod Snapshot (Wrapped)</h2>
        <pre id="snapshotBlock" class="mono">{}</pre>
      </article>
    </section>
  </main>

  <script src="../../lib/demo-store.js"></script>
  <script>
    (function () {
      const store = window.SovereignDemoStore;
      if (!store) {
        document.body.innerHTML = '<main class="wrap"><p>Demo store unavailable.</p></main>';
        return;
      }

      const byId = (id) => document.getElementById(id);
      let currentWebId = '';

      const fillSelect = (selectEl, rows, placeholder) => {
        selectEl.innerHTML = '';
        if (!rows.length) {
          const option = document.createElement('option');
          option.value = '';
          option.textContent = placeholder;
          selectEl.appendChild(option);
          return;
        }

        rows.forEach((entry) => {
          const option = document.createElement('option');
          option.value = entry.webId;
          option.textContent = `${entry.displayName} (${entry.webId})`;
          selectEl.appendChild(option);
        });
      };

      const setList = (el, rows, empty) => {
        el.innerHTML = '';
        if (!rows.length) {
          const li = document.createElement('li');
          li.textContent = empty;
          el.appendChild(li);
          return;
        }

        rows.forEach((text) => {
          const li = document.createElement('li');
          if (typeof text === 'string') {
            li.textContent = text;
          } else {
            li.textContent = String(text);
          }
          el.appendChild(li);
        });
      };

      const refresh = () => {
        const identities = store.listIdentities();
        fillSelect(byId('identitySelect'), identities, 'No identities available');

        if (!currentWebId && identities.length) {
          currentWebId = identities[0].webId;
        }

        if (currentWebId) {
          byId('identitySelect').value = currentWebId;
        }

        const identity = identities.find((entry) => entry.webId === currentWebId);
        if (!identity) {
          byId('identitySummary').textContent = 'No identity selected.';
          byId('profileBlock').textContent = '{}';
          byId('snapshotBlock').textContent = '{}';
          setList(byId('credentialList'), [], 'No credentials.');
          setList(byId('resourceList'), [], 'No provider resources.');
          setList(byId('consentList'), [], 'No active sharing permissions.');
          setList(byId('referralList'), [], 'No referrals for this identity.');
          setList(byId('eventList'), [], 'No events for this identity.');
          return;
        }

        const credentials = store.listCredentials(currentWebId);
        const records = store.listRecords(currentWebId);
        const consents = store.listConsents(currentWebId, { includeRevoked: true });
        const referrals = store.listReferrals({ subjectWebId: currentWebId, includeClosed: true });
        const events = store.listEvents({ subjectWebId: currentWebId, limit: 16 });

        const recordsByProvider = records.reduce((acc, entry) => {
          const key = entry.providerLabel || entry.providerId || 'Unknown provider';
          acc[key] = (acc[key] || 0) + 1;
          return acc;
        }, {});

        byId('identitySummary').textContent = `${identity.displayName} | ${identity.webId}`;
        byId('profileBlock').textContent = JSON.stringify(identity, null, 2);

        setList(
          byId('credentialList'),
          credentials.slice(0, 20).map((entry) => `${entry.createdAt} | ${entry.type} | issuer: ${entry.issuerProviderId || 'n/a'}`),
          'No credentials.'
        );

        setList(
          byId('resourceList'),
          Object.keys(recordsByProvider).sort().map((label) => `${label}: ${recordsByProvider[label]} record(s)`),
          'No provider resources.'
        );

        setList(
          byId('consentList'),
          consents.slice(0, 20).map((entry) => `${entry.status.toUpperCase()} | ${entry.providerId} | ${entry.scope}`),
          'No sharing permissions.'
        );

        setList(
          byId('referralList'),
          referrals.slice(0, 20).map((entry) => `${entry.status.toUpperCase()} | ${entry.summary} | target: ${entry.targetCapability}`),
          'No referrals for this identity.'
        );

        setList(
          byId('eventList'),
          events.map((entry) => `${entry.createdAt} | ${entry.type} | ${entry.message || 'event'}`),
          'No events for this identity.'
        );

        const snapshot = {
          identity,
          credentials,
          records,
          consents,
          referrals,
          events
        };
        byId('snapshotBlock').textContent = JSON.stringify(snapshot, null, 2);
      };

      byId('identitySelect').addEventListener('change', () => {
        currentWebId = byId('identitySelect').value;
        refresh();
      });

      byId('refreshBtn').addEventListener('click', refresh);
      store.subscribe(refresh);
      refresh();
    })();
  </script>
</body>
</html>
