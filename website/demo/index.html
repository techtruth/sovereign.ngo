<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sovereign NGO | Demo Hub</title>
  <meta name="description" content="Iframe demo hub for Sovereign NGO service and verification flows.">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <style>
    :root {
      --bg: #f2f5f9;
      --surface: #ffffff;
      --ink: #1a2733;
      --ink-soft: #3a4b5b;
      --line: #c7d5e2;
      --brand: #0f5d8f;
      --focus: #0b63a5;
      --radius: 14px;
      --shadow: 0 10px 30px rgba(20, 46, 74, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top right, #deebf6 0%, var(--bg) 52%);
      color: var(--ink);
      font-family: "Source Serif 4", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      line-height: 1.45;
    }
    .container {
      width: min(1280px, 96vw);
      margin: 0 auto;
      padding: 18px 0 24px;
    }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }
    .topbar a {
      color: var(--brand);
      text-decoration: none;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 0.92rem;
    }
    h1 {
      margin: 0;
      color: #164969;
      font-size: clamp(1.4rem, 2.9vw, 2rem);
    }
    .note {
      margin: 0 0 10px;
      color: var(--ink-soft);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }
    .controls {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 10px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .controls label {
      display: grid;
      gap: 4px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 0.85rem;
      color: var(--ink-soft);
    }
    .controls input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }
    .controls button {
      align-self: end;
      justify-self: start;
      border: 1px solid #0c4f79;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      font: 700 0.88rem "Trebuchet MS", "Segoe UI", sans-serif;
      padding: 8px 12px;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel h2 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: #1a4d6e;
      font-size: 0.95rem;
      background: #f7fbff;
    }
    iframe {
      width: 100%;
      height: 480px;
      border: 0;
      background: #fff;
    }
    a:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }
    @media (max-width: 1050px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <h1>Demo Hub (Iframe View)</h1>
      <div>
        <a href="../ngo/index.html">Nonprofit Website</a>
      </div>
    </div>
    <p class="note">Set iframe URLs below (local ports or hosted demo subdomains), then refresh the frames.</p>

    <section class="controls" aria-label="Demo frame controls">
      <label>
        Holder / Wallet
        <input id="url1" value="http://localhost:8180/">
      </label>
      <label>
        Credential Explorer
        <input id="url2" value="http://localhost:8070/">
      </label>
      <label>
        Issuer Portal
        <input id="url3" value="http://localhost:8081/">
      </label>
      <label>
        Verifier Portal
        <input id="url4" value="http://localhost:8091/">
      </label>
      <button id="applyBtn" type="button">Refresh Frames</button>
    </section>

    <section class="grid" aria-label="Embedded demos">
      <article class="panel">
        <h2>Holder / Wallet</h2>
        <iframe id="frame1" title="Holder Wallet Demo" src="http://localhost:8180/"></iframe>
      </article>
      <article class="panel">
        <h2>Credential Explorer</h2>
        <iframe id="frame2" title="Credential Explorer Demo" src="http://localhost:8070/"></iframe>
      </article>
      <article class="panel">
        <h2>Issuer Portal</h2>
        <iframe id="frame3" title="Issuer Portal Demo" src="http://localhost:8081/"></iframe>
      </article>
      <article class="panel">
        <h2>Verifier Portal</h2>
        <iframe id="frame4" title="Verifier Portal Demo" src="http://localhost:8091/"></iframe>
      </article>
    </section>
  </main>

  <script>
    const apply = () => {
      const pairs = [
        ["url1", "frame1"],
        ["url2", "frame2"],
        ["url3", "frame3"],
        ["url4", "frame4"]
      ];
      for (const [inputId, frameId] of pairs) {
        const value = document.getElementById(inputId).value.trim();
        document.getElementById(frameId).src = value || "about:blank";
      }
    };
    document.getElementById("applyBtn").addEventListener("click", apply);
  </script>
</body>
</html>
